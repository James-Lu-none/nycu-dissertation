  # AFL Base Services
  # ==========================================
  afl-base-1:
    container_name: "${CVE}-afl-base-1"
    build:
      context: "./${CVE}"
      dockerfile: Dockerfile
    image: "${IMAGE_NAME}"
    command: bash -c "bash script.sh && sleep infinity"
    working_dir: /workspace
    pid: "host"
    environment:
      - TARGET_BIN=${TARGET_BIN_BASE}
      - TARGET_ARGS=${TARGET_ARGS}
      - FUZZER_BIN=afl-fuzz
      - FUZZER_ROLE=M
      - FUZZER_NAME=main
    volumes:
      - "afl-out-base-1:/workspace/out"
      - "./script.sh:/workspace/script.sh:ro"

